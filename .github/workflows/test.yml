name: test

on:
  push:
    branches: [dev, main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Configure git
        run: |
          git config --global user.email "bot@swust-code.dev"
          git config --global user.name "swust-code"
        if: runner.os == 'Linux'

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Run tests
        run: bun turbo test --output-logs=errors-only
        env:
          SWUST_CODE_EXPERIMENTAL_DISABLE_FILEWATCHER: "1"

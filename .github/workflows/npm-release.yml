name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: npm-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GH_REPO: MakeBlackSheepGreat/swust-code
      GH_TOKEN: ${{ github.token }}
      NODE_AUTH_TOKEN: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Setup npm registry
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          PACKAGE_VERSION="$(node -p "require('./packages/opencode/package.json').version")"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            if [ "${TAG_VERSION}" != "${PACKAGE_VERSION}" ]; then
              echo "::error::Tag ${GITHUB_REF_NAME} does not match packages/opencode version ${PACKAGE_VERSION}"
              exit 1
            fi
          fi
          echo "version=${PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Prepare trusted publishing toolchain
        run: |
          npm install -g npm@^11.5.1
          node --version
          npm --version

      - name: Run typecheck
        run: bun typecheck

      - name: Create draft GitHub release
        env:
          SWUST_CODE_CHANNEL: latest
          SWUST_CODE_VERSION: ${{ steps.version.outputs.version }}
        run: bun ./script/version.ts

      - name: Build release packages
        env:
          SWUST_CODE_CHANNEL: latest
          SWUST_CODE_VERSION: ${{ steps.version.outputs.version }}
          SWUST_CODE_RELEASE: "1"
        run: bun run --cwd packages/opencode build

      - name: Publish packages to npm
        env:
          NPM_CONFIG_PROVENANCE: "true"
          SWUST_CODE_CHANNEL: latest
          SWUST_CODE_VERSION: ${{ steps.version.outputs.version }}
        run: bun run --cwd packages/opencode ./script/publish.ts

      - name: Verify npm package is published
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          for attempt in {1..10}; do
            if npm view "@swust-code/cli@${VERSION}" version --registry=https://registry.npmjs.org/; then
              exit 0
            fi
            echo "npm registry has not reflected @swust-code/cli@${VERSION} yet (attempt ${attempt}/10)"
            sleep 15
          done
          echo "::error::@swust-code/cli@${VERSION} was not visible on npm after publish"
          exit 1

      - name: Publish GitHub release
        run: gh release edit v${{ steps.version.outputs.version }} --draft=false --latest --repo ${GH_REPO}
